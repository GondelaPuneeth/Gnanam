name: gnanam
description: "Gnanam — An offline AI tutor app for Indian students (Grades 1-12) using on-device Gemma 2-2B GGUF models"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # UI & rendering
  flutter_markdown: ^0.7.4
  flutter_math_fork: ^0.7.2
  flutter_highlight: ^0.7.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1

  # On-device AI inference (Google's official flutter_gemma)
  flutter_gemma: ^1.1.2
  flutter_gemma_mediapipe: ^1.0.0

  # Networking & downloads
  dio: ^5.7.0

  # Storage & security
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  crypto: ^3.0.6

  # Feature modules
  google_mlkit_text_recognition: ^0.14.0
  math_expressions: ^2.6.0
  archive: ^4.0.0
  syncfusion_flutter_pdf: ^24.1.41
  markdown: ^7.3.1
  camera: ^0.11.0+2
  file_picker: ^8.1.4
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Utilities
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  google_mlkit_image_labeling: ^0.13.0
  google_mlkit_object_detection: ^0.14.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/prompts/
    - assets/safety/